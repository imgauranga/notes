<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#0b0f19"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://i.ibb.co/GvtcmWTF/20260610-142950.png' rel='icon' type='image/x-icon'/>
  <link href='https://i.ibb.co/GvtcmWTF/20260610-142950.png' rel='icon' sizes='32x32' type='image/png'/>
  <link href='https://i.ibb.co/GvtcmWTF/20260610-142950.png' rel='icon' sizes='16x16' type='image/png'/>    
  <title>Notebook — By Gauranga</title>
  
  <style>
      select {
    -webkit-tap-highlight-color: transparent;
}
    :root {
      --bg: #0b0f19;
      --card: #141b2d;
      --card-hover: #1f2942;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #ff4757;
      --accent-glow: rgba(255, 71, 87, 0.15);
      --gradient: linear-gradient(135deg, #ff4757, #ff6b81);
      --border: rgba(255, 255, 255, 0.05);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(255, 71, 87, 0.03) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.02) 0%, transparent 40%);
    }

    /* Premium Header */
    .nav {
      background:#141b2d;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 1.2rem 6px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    
    .nav-container {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 1rem;
    }

    .nav h1 { 
      margin: 0; 
      font-size: 1.5rem; 
      font-weight: 700;
      letter-spacing: -0.5px;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .bi-journal-text {
      fill: url(#gradient-fill);
      margin-bottom: -2px;
    }

    /* Premium Dropdown Style */
    .filter-wrapper {
      position: relative;
    }

    .year-select {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      font-weight: 500;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background-color: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      cursor: pointer;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
    
    }

    .year-select:hover, .year-select:focus {
    
      border-color: var(--accent);
      background-color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .year-select option {
      background-color: var(--card);
      color: var(--text-main);
    }

    /* Main Container */
    .container {
      max-width: 700px;
      margin: 2.5rem auto;
      padding: 0 1rem;
    }

    /* Premium Post Cards */
    .post-card {
      background: var(--card);
      padding: 2.2rem;
      border-radius: 16px;
      margin-bottom: 2rem;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      animation: fadeIn 0.6s ease-out both;
    }

    .post-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 71, 87, 0.3);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35), 0 0 15px rgba(255, 71, 87, 0.05);
    }

    .post-title {
      font-size: 1.65rem;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 0.6rem;
      color: var(--text-main);
      letter-spacing: -0.3px;
      line-height: 1.3;
    }

    .post-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    
    .post-meta svg {
      color: var(--accent);
    }

    .post-body {
      line-height: 1.8;
      font-size: 1.05rem;
      color: #cbd5e1; /* Smooth grey for highly readable reading experience */
      white-space: pre-wrap;
    }

    /* Utilities & Animations */
    .hidden { display: none !important; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loader */
    .loader { 
      text-align: center; 
      font-size: 1.1rem; 
      color: var(--text-muted); 
      margin-top: 5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    
    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,71,87,0.1);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
    <linearGradient id="gradient-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4757" />
      <stop offset="100%" stop-color="#ff6b81" />
    </linearGradient>
  </svg>
  
  <div class="nav">    
    <div class="nav-container">
      <h1>
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" class="bi bi-journal-text" viewBox="0 0 16 16">  
          <path d="M5 10.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5m0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m0-2a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5"/>  
          <path d="M3 0h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2v-1h1v1a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1v1H1V2a2 2 0 0 1 2-2"/>  
          <path d="M1 5v-.5a.5.5 0 0 1 1 0V5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1zm0 3v-.5a.5.5 0 0 1 1 0V8h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1zm0 3v-.5a.5.5 0 0 1 1 0v.5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1z"/>
        </svg> 
        Notebook
      </h1>  
      
      <div class="filter-wrapper">
        <select id="yearFilter" class="year-select" style="display: none;">
          <option value="all">All Years</option>
        </select>
      </div>
    </div>
  </div>

  <div class="container">    
    <div id="loader" class="loader">
      <div class="spinner"></div>
      <span>Securing content...</span>
    </div>    
    <div id="blog-posts"></div>  
  </div>

  <script>    
    // ⚠️ APNI DETAILS YAHAN DAALEIN    
    const API_KEY = 'AIzaSyD-7ifcYbg0I4v7l44yo-KfSO7SUNU8W28';    
    const FOLDER_ID = '1f6U9Luvm85-s0ofbdWS0KNIAq75zUWCw';

    const blogContainer = document.getElementById('blog-posts');    
    const loader = document.getElementById('loader');
    const yearFilter = document.getElementById('yearFilter');

    async function fetchBlogPosts() {      
      try {        
        const listUrl = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType='text/plain'+and+trashed=false&fields=files(id,name,modifiedTime)&key=${API_KEY}`;                
        const response = await fetch(listUrl);        
        const data = await response.json();                
        
        if (!data.files || data.files.length === 0) {          
          loader.innerHTML = "<span>No posts found or folder is not public.</span>";          
          return;        
        }

        data.files.sort((a, b) => new Date(b.modifiedTime) - new Date(a.modifiedTime));
        loader.style.display = 'none';
        
        const availableYears = new Set();
        let animationDelay = 0;

        for (const file of data.files) {          
          const contentUrl = `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&key=${API_KEY}`;                    
          try {            
            const contentResponse = await fetch(contentUrl);            
            const textContent = await contentResponse.text();                        
            
            const title = file.name.replace('.txt', '');            
            const dateObj = new Date(file.modifiedTime);
            const postYear = dateObj.getFullYear();
            availableYears.add(postYear);

            const date = dateObj.toLocaleDateString('en-US', {              
              day: 'numeric', month: 'short', year: 'numeric'            
            });

            // Added dynamic staggered animation delay for a smoother load experience
            const postHTML = `              
              <article class="post-card" data-year="${postYear}" style="animation-delay: ${animationDelay}s">                
                <h2 class="post-title">${title}</h2>                
                <div class="post-meta">
                  <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" class="bi bi-calendar3" viewBox="0 0 16 16">  
                    <path d="M14 0H2a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2M1 3.857C1 3.384 1.448 3 2 3h12c.552 0 1 .384 1 .857v10.286c0 .473-.448.857-1 .857H2c-.552 0-1-.384-1-.857z"/>  
                    <path d="M6.5 7a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m-9 3a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m-9 3a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2m3 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2"/>
                  </svg> ${date}
                </div>                
                <div class="post-body">${escapeHTML(textContent)}</div>              
              </article>            
            `;            
            blogContainer.innerHTML += postHTML;
            animationDelay += 0.1; // cascading entry

          } catch (err) {            
            console.error("Content sync issue:", err);          
          }        
        }

        setupYearFilter(availableYears);

      } catch (error) {        
        loader.innerHTML = "<span style='color: #ff4757;'>Error loading notebook configuration. Please verify credentials.</span>";        
        console.error(error);      
      }    
    }

    function setupYearFilter(yearsSet) {
      const sortedYears = Array.from(yearsSet).sort((a, b) => b - a);
      
      sortedYears.forEach(year => {
        const option = document.createElement('option');
        option.value = year;
        option.textContent = year;
        yearFilter.appendChild(option);
      });

      yearFilter.style.display = 'inline-block';

      yearFilter.addEventListener('change', (e) => {
        const selectedYear = e.target.value;
        const posts = document.querySelectorAll('.post-card');

        posts.forEach(post => {
          const postYear = post.getAttribute('data-year');
          if (selectedYear === 'all' || postYear === selectedYear) {
            post.classList.remove('hidden');
          } else {
            post.classList.add('hidden');
          }
        });
      });
    }

    function escapeHTML(str) {      
      return str.replace(/[&<>'"]/g,         
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)      
      );    
    }

    fetchBlogPosts();  
  </script>
</body>
</html>
